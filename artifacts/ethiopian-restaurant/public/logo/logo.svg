<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Coffee cup icon -->
  <g transform="translate(4, 8)">
    <!-- Cup body -->
    <path d="M12 14 L8 52 Q8 56 12 56 L36 56 Q40 56 40 52 L36 14 Z" fill="#7C4A2D" rx="2"/>
    <!-- Cup rim -->
    <rect x="8" y="11" width="32" height="5" rx="2.5" fill="#A0673A"/>
    <!-- Steam lines -->
    <path d="M16 6 Q18 2 20 6 Q22 10 24 6" stroke="#C9A66B" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M24 4 Q26 0 28 4 Q30 8 32 4" stroke="#C9A66B" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <!-- Saucer -->
    <ellipse cx="24" cy="57" rx="22" ry="4" fill="#A0673A" opacity="0.6"/>
    <!-- Handle -->
    <path d="M40 24 Q54 24 54 33 Q54 42 40 42" stroke="#7C4A2D" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Music note inside cup -->
    <circle cx="24" cy="37" r="3.5" fill="#C9A66B" opacity="0.9"/>
    <rect x="27.2" y="28" width="2" height="12" rx="1" fill="#C9A66B" opacity="0.9"/>
    <rect x="27.2" y="28" width="6" height="2.5" rx="1" fill="#C9A66B" opacity="0.9"/>
  </g>

  <!-- Text: Café Melody -->
  <text x="72" y="36" font-family="Georgia, 'Playfair Display', serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#3D1F0A">Café Melody</text>

  <!-- Decorative line -->
  <rect x="72" y="43" width="80" height="1.5" rx="1" fill="#C9A66B" opacity="0.7"/>

  <!-- Subtext: BISTRO · BONN -->
  <text x="72" y="60" font-family="Georgia, serif" font-size="11" letter-spacing="4" fill="#7C4A2D" font-weight="400">BISTRO · BONN</text>
</svg>
