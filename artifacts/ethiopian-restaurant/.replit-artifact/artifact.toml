kind = "web"
previewPath = "/"
title = "Äthiopisches Restaurant"
version = "1.0.0"
id = "artifacts/ethiopian-restaurant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25865

[services.development]
run = "pnpm --filter @workspace/ethiopian-restaurant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ethiopian-restaurant", "run", "build" ]
publicDir = "artifacts/ethiopian-restaurant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25865"
BASE_PATH = "/"
